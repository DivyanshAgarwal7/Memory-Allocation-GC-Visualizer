<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — MEM SIM</title>
  <link rel="stylesheet" href="css/site.css" />
  <link rel="stylesheet" href="account-panel.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="nav">
    <div class="container">
      <a href="landing.html" class="logo">MEM<span class="accent">SIM</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Simulator</a></li>
      </ul>
      <div class="nav-actions">
        <button id="logout-btn" class="btn btn-ghost">Sign out</button>
      </div>
    </div>
  </nav>

  <main class="dash-main">
    <div class="dash-header">
      <h1>Welcome back, <span id="dash-username">…</span></h1>
      <p class="dash-subhead">Your saved heap states, at a glance.</p>
    </div>

    <div class="dash-stat-strip" id="dash-stat-strip" aria-hidden="true">
      <div class="dash-stat">
        <span class="dash-stat-value" id="stat-count">—</span>
        <span class="dash-stat-label">Saved</span>
      </div>
      <div class="dash-stat">
        <span class="dash-stat-value" id="stat-util">—</span>
        <span class="dash-stat-label">Avg utilization</span>
      </div>
      <div class="dash-stat">
        <span class="dash-stat-value" id="stat-last">—</span>
        <span class="dash-stat-label">Last saved</span>
      </div>
    </div>

    <div class="dash-section-head">
      <h2>Your saved simulations</h2>
      <a href="index.html" class="btn btn-ghost btn-small">+ New simulation</a>
    </div>

    <div id="dash-sims-container">
      <p class="account-signed-out">Loading your saved simulations…</p>
    </div>
  </main>

  <script src="js/tilt-cards.js"></script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
